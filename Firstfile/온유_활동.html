<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>온유 — 부드러운 마음 체험 활동</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #FAF8F3;
    color: #2C2A24;
    min-height: 100vh;
    padding: 0;
  }

  #app { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; }

  .header {
    text-align: center;
    padding: 24px 0 20px;
  }
  .header-title {
    font-size: 22px;
    font-weight: 600;
    color: #7A6040;
    letter-spacing: .05em;
  }
  .header-sub {
    font-size: 13px;
    color: #9A8060;
    margin-top: 4px;
  }
  .header-line {
    width: 32px; height: 1px;
    background: #C8A060;
    margin: 12px auto 0;
  }

  .stage-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    padding: 0 2px;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #D9D3C8;
    transition: background .3s;
    flex-shrink: 0;
  }
  .dot.done { background: #B49A6A; }
  .dot.active { background: #7A6040; }
  .stage-lbl { font-size: 12px; color: #9A8060; margin-left: 4px; }

  .scene-card {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid #EDE6D8;
    margin-bottom: 12px;
  }
  .scene-top {
    background: #F5EDD8;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .loc-tag {
    position: absolute;
    top: 8px; left: 12px;
    font-size: 11px;
    color: #9A8060;
    font-weight: 500;
  }
  .chars {
    display: flex;
    gap: 32px;
    align-items: flex-end;
  }
  .ch { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .ch-h { width: 30px; height: 30px; border-radius: 50%; }
  .ch-b { width: 22px; height: 32px; border-radius: 11px 11px 4px 4px; }
  .ch-l { font-size: 10px; color: #9A8060; font-weight: 500; }
  .me .ch-h { background: #A8C4D8; }
  .me .ch-b { background: #6A9BBF; }
  .daen .ch-h { background: #D4A882; }
  .daen .ch-b { background: #9A6E4A; }

  .scene-body { padding: 16px 18px; }
  .narr {
    font-size: 13px;
    color: #9A8060;
    font-style: italic;
    line-height: 1.6;
    margin-bottom: 10px;
  }
  .spk { font-size: 12px; font-weight: 600; color: #9A8060; margin-bottom: 4px; }
  .dlg { font-size: 16px; color: #2C2A24; line-height: 1.75; }

  .choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 0; }
  .cbtn {
    background: #fff;
    border: 1px solid #D9D3C8;
    border-radius: 12px;
    padding: 14px 16px;
    text-align: left;
    cursor: pointer;
    font-size: 15px;
    color: #2C2A24;
    line-height: 1.55;
    width: 100%;
    transition: background .15s;
    -webkit-appearance: none;
  }
  .cbtn:active { background: #F5EDD8; }
  .cbtn:disabled { cursor: default; opacity: .5; }
  .lbl {
    font-size: 12px;
    font-weight: 600;
    color: #9A8060;
    margin-right: 6px;
  }

  .action-btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
    -webkit-appearance: none;
  }
  .action-btn.pri { background: #8B7355; color: #FFF8EC; }
  .action-btn.pri:active { background: #7A6040; }
  .action-btn.sec {
    background: transparent;
    border: 1px solid #D9D3C8;
    color: #2C2A24;
  }
  .action-btn.sec:active { background: #F5EDD8; }

  .end-card {
    background: #fff;
    border-radius: 16px;
    border: 1px solid #EDE6D8;
    padding: 32px 24px;
    text-align: center;
  }
  .end-icon {
    width: 52px; height: 52px;
    border-radius: 50%;
    margin: 0 auto 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .end-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .end-line {
    width: 32px; height: 1px;
    margin: 0 auto 16px;
  }
  .end-msg {
    font-size: 15px;
    color: #6A6058;
    line-height: 1.8;
    text-align: left;
    margin-bottom: 24px;
  }
  .end-msg p { margin-bottom: 12px; }
  .end-divider {
    border: none;
    border-top: 1px solid #EDE6D8;
    margin: 0 0 16px;
  }
  .end-hint {
    font-size: 12px;
    color: #9A8060;
    margin-bottom: 10px;
  }
</style>
</head>

    ]
  },

    narr:"다은이가 잠깐 멈추며 불안해 보였다.",
    speaker:"다은",
    dlg:"\"...그래? 그냥 나와버려도 돼?\" (확신이 없어 보였다)",
    choices:[
      {text:"\"아, 내가 너무 빨리 말했다. 네가 진짜 원하는 게 뭔지가 중요해.\"", next:'main3'},

const STAGES = 4;
let cur = 'start', maxStage = 0;

function charHTML() {
  return `<div class="chars">
    <div class="ch me"><div class="ch-h"></div><div class="ch-b"></div><div class="ch-l">나</div></div>
    <div class="ch daen"><div class="ch-h"></div><div class="ch-b"></div><div class="ch-l">다은</div></div>
  </div>`;
}

function dots(s) {
  const bar = document.getElementById('sbar');
  if (!bar) return;
  bar.innerHTML = '';
  for (let i = 0; i < STAGES; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < s ? ' done' : i === s ? ' active' : '');
    bar.appendChild(d);
  }
  const l = document.createElement('span');
  l.className = 'stage-lbl';
  l.textContent = (Math.min(s, STAGES-1) + 1) + ' / ' + STAGES + '단계';
  bar.appendChild(l);
}

function render() {
  const node = N[cur];
  if (!node) return;
  const main = document.getElementById('main');

  if (node.isEnd) {
    const sbar = document.getElementById('sbar');
    if (sbar) sbar.innerHTML = '';
    renderEnd(node, main);
    return;
  }

  const s = node.stage || 0;
  if (s > maxStage) maxStage = s;
  dots(Math.min(maxStage, STAGES-1));

  const labels = ['A','B','C'];
  main.innerHTML = `
    <div class="scene-card">
      <div class="scene-top">
        <span class="loc-tag">${node.loc}</span>
        ${charHTML()}
      </div>
      <div class="scene-body">
        ${node.narr ? `<div class="narr">${node.narr}</div>` : ''}
        <div class="spk">${node.speaker}</div>
        <div class="dlg">${node.dlg}</div>
      </div>
    </div>
    <div class="choices" id="cw"></div>
  `;

  const cw = document.getElementById('cw');
  node.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'cbtn';
    btn.innerHTML = `<span class="lbl">${labels[i]}</span>${c.text}`;
    btn.onclick = () => { cur = c.next; render(); };
    cw.appendChild(btn);
  });
}

function renderEnd(node, main) {
  const isGood = node.endType === 'good';

  const dlgCard = node.endDlg ? `
    <div class="scene-card" style="margin-bottom:12px;">
      <div class="scene-top"><span class="loc-tag">학교 벤치, 점심 시간</span>${charHTML()}</div>
      <div class="scene-body"><div class="spk">다은</div><div class="dlg">${node.endDlg}</div></div>
    </div>` : '';

  const msgLines = node.endMsg.split('\n\n').map(l => `<p>${l}</p>`).join('');

  const svgIcon = isGood
    ? `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26Z" fill="#C8A060"/></svg>`
    : `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#B0A090" stroke-width="1.5"/><path d="M12 7v5.5M12 15.5v1" stroke="#B0A090" stroke-width="1.5" stroke-linecap="round"/></svg>`;

  main.innerHTML = dlgCard + `
    <div class="end-card">
      <div class="end-icon" style="background:${isGood ? '#F5EDD8' : '#F0ECE4'};">${svgIcon}</div>
      <div class="end-title" style="color:${isGood ? '#7A6040' : '#4A4038'};">${node.endTitle}</div>
      <div class="end-line" style="background:${isGood ? '#C8A060' : '#C8BEB0'};"></div>
      <div class="end-msg">${msgLines}</div>
      <hr class="end-divider">
      <div class="end-hint">처음부터 다시 해볼까요?</div>
      <button class="action-btn sec" onclick="restart()">다시 시작하기</button>
    </div>
  `;
}

function restart() {
  cur = 'start'; maxStage = 0;
  document.getElementById('sbar').innerHTML = '';
  document.getElementById('main').innerHTML = '';
  render();
}

render();
</script>
</body>
</html>
