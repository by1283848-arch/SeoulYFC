<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>온유 — 고백편</title>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;background:#FAF8F3;color:#2C2A24;min-height:100vh;}#wrap{max-width:520px;margin:0 auto;padding:20px 16px 60px;}.hdr{text-align:center;padding:24px 0 20px;}.hdr-t{font-size:22px;font-weight:700;color:#8A4060;}.hdr-s{font-size:13px;color:#9A8060;margin-top:4px;}.hdr-l{width:32px;height:1px;background:#A85872;margin:12px auto 0;}.sbar{display:flex;align-items:center;gap:8px;margin-bottom:20px;}.dot{width:10px;height:10px;border-radius:50%;background:#D9D3C8;}.dot.done{background:#B49A6A;}.dot.active{background:#7A6040;}.slbl{font-size:12px;color:#9A8060;margin-left:4px;}.sc{background:#fff;border-radius:16px;border:1px solid #EDE6D8;overflow:hidden;margin-bottom:12px;}.stop{height:90px;background:#F5EAF0;display:flex;align-items:center;justify-content:center;position:relative;}.ltag{position:absolute;top:8px;left:12px;font-size:11px;color:#9A8060;font-weight:500;}.chars{display:flex;gap:32px;align-items:flex-end;}.ch{display:flex;flex-direction:column;align-items:center;gap:3px;}.ch-h{width:30px;height:30px;border-radius:50%;}.ch-b{width:22px;height:32px;border-radius:11px 11px 4px 4px;}.ch-l{font-size:10px;color:#9A8060;font-weight:500;}.me .ch-h{background:#A8C4D8;}.me .ch-b{background:#6A9BBF;}.soi .ch-h{background:#D4829A;}.soi .ch-b{background:#A85872;}.sbody{padding:16px 18px;}.narr{font-size:13px;color:#9A8060;font-style:italic;line-height:1.6;margin-bottom:10px;}.spk{font-size:12px;font-weight:600;color:#9A8060;margin-bottom:4px;}.dlg{font-size:16px;color:#2C2A24;line-height:1.75;}.choices{display:flex;flex-direction:column;gap:10px;}.cbtn{display:block;background:#fff;border:1px solid #D9D3C8;border-radius:12px;padding:14px 16px;text-decoration:none;font-size:15px;color:#2C2A24;line-height:1.55;cursor:pointer;width:100%;text-align:left;}.cbtn:active{background:#F5EAF0;}.lbl{font-size:12px;font-weight:600;color:#9A8060;margin-right:6px;}.end-card{background:#fff;border-radius:16px;border:1px solid #EDE6D8;padding:32px 24px;text-align:center;}.eico{width:52px;height:52px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;}.etit{font-size:20px;font-weight:700;margin-bottom:8px;}.eline{width:32px;height:1px;margin:0 auto 16px;}.emsg{font-size:15px;color:#6A6058;line-height:1.8;text-align:left;margin-bottom:24px;}.emsg p{margin-bottom:12px;}.ediv{border:none;border-top:1px solid #EDE6D8;margin:0 0 16px;}.ehint{font-size:12px;color:#9A8060;margin-bottom:10px;}.rbtn{background:transparent;border:1px solid #D9D3C8;border-radius:12px;padding:12px 24px;font-size:15px;cursor:pointer;color:#2C2A24;}</style></head>
<body><div id="wrap"><div class="hdr"><div class="hdr-t">온유</div><div class="hdr-s">고백 후 거절당한 친구 소이</div><div class="hdr-l"></div></div><div class="sbar" id="sbar"></div><div id="main"></div></div>
<script>
const N={start:{stage:0,loc:"학교 복도 구석, 쉬는 시간",narr:"쉬는 시간, 소이가 복도 구석에 혼자 있다. 오늘 준혁이한테 고백했다가 거절당했다는 소식이 들렸다.",speaker:"소이",dlg:'"...어, 왔어. 그냥 가."',ch:[{t:"(말없이 옆에 와서 조용히 벽에 기댄다)",n:"main1"},{t:'"야, 많이 창피했지?"',n:"b0a"},{t:'"소이야, 나 그 얘기 들었는데... 괜찮아?"',n:"b0b"}]},
b0a:{stage:0,loc:"학교 복도 구석, 쉬는 시간",narr:"소이가 퍼뜩 눈을 피했다.",speaker:"소이",dlg:'"...그 얘기 퍼졌어?"',ch:[{t:'"아니, 그냥 네 얼굴 보니까. 미안, 그냥 옆에 있을게."',n:"main1"},{t:'"어, 몇 명이 얘기하던데."',n:"b_ea"}]},
b0b:{stage:0,loc:"학교 복도 구석, 쉬는 시간",narr:"소이의 눈에 눈물이 맺혔다.",speaker:"소이",dlg:'"...다 알아?"',ch:[{t:'"미안, 그 말 먼저 할 게 아니었다. 나 그냥 네 옆에 있을게."',n:"main1"},{t:'"응, 근데 걱정 마. 다들 금방 잊어버릴 거야."',n:"b_ea"}]},
b_ea:{E:true,T:"bad",tit:"마음의 문이 닫혔어요",edlg:'"...나 좀 혼자 있을게." (서둘러 자리를 피했다)',msg:"소이가 가장 창피한 순간에, 창피함이 더 퍼졌다는 걸 알게 됐어요.\n\n온유함은 상대가 이미 아는 것을 굳이 확인시키지 않는 것이에요."},
main1:{stage:1,loc:"학교 복도 구석, 쉬는 시간",narr:"한참 침묵이 흘렀다.",speaker:"소이",dlg:'"...나 진짜 바보같지?"',ch:[{t:'"아니." (짧게, 그냥 같이 복도를 바라본다)',n:"main2"},{t:'"바보같긴, 용감한 거잖아!"',n:"b1a"},{t:'"왜 고백했어, 갑자기?"',n:"b1b"}]},
b1a:{stage:1,loc:"학교 복도 구석, 쉬는 시간",narr:"소이가 고개를 저었다.",speaker:"소이",dlg:'"...용감해서 뭐해. 차였는데."',ch:[{t:'"맞아. 지금은 그냥 많이 아프지?"',n:"main2"},{t:'"그래도 후회하지 마! 고백 안 하는 것보단 낫잖아."',n:"b_eb"}]},
b1b:{stage:1,loc:"학교 복도 구석, 쉬는 시간",narr:"소이의 표정이 굳었다.",speaker:"소이",dlg:'"...그냥 좋았으니까." (시선을 피했다)',ch:[{t:'"미안, 그건 내가 물어볼 게 아니었다."',n:"main2"},{t:'"아, 그렇구나. 근데 준혁이가 뭐라고 했어?"',n:"b_eb"}]},
b_eb:{E:true,T:"bad",tit:"마음의 문이 닫혔어요",edlg:'"...됐어. 나 혼자 있을게." (자리를 피했다)',msg:"소이에게 가장 필요한 건 이유 설명이나 격려가 아니었어요. 지금 아프다는 것 자체를 인정해주는 말 한마디였어요.\n\n온유함은 상대의 감정에 먼저 도착하는 것이에요."},
main2:{stage:2,loc:"학교 복도 구석, 쉬는 시간",narr:"소이가 코를 훌쩍였다.",speaker:"소이",dlg:'"...나 앞으로 준혁이 볼 때마다 어떡하지. 같은 반인데."',ch:[{t:'"그거 진짜 힘들겠다. 매일 봐야 하잖아."',n:"main3"},{t:'"걱정 마, 다들 금방 잊어버려."',n:"b2a"},{t:'"야, 준혁이 사실 별로야. 안 어울려도 돼."',n:"b2b"}]},
b2a:{stage:2,loc:"학교 복도 구석, 쉬는 시간",narr:"소이가 고개를 저었다.",speaker:"소이",dlg:'"...잊어버리면 뭐해. 지금 이 순간이 너무 힘든데."',ch:[{t:'"맞아. 지금 이 순간이 진짜 힘들지. 미안."',n:"main3"},{t:'"진짜야, 시간이 약이야. 다음 주면 괜찮아질 거야."',n:"b_ec"}]},
b2b:{stage:2,loc:"학교 복도 구석, 쉬는 시간",narr:"소이가 더 속상해 보였다.",speaker:"소이",dlg:'"...준혁이가 별로인 게 아니라 내가 차인 거잖아."',ch:[{t:'"미안, 내 말이 이상하게 들렸지? 지금 얼마나 속상한지가 중요한 거야."',n:"main3"},{t:'"아니, 진짜야! 준혁이 성격도 별로고..."',n:"b_ec"}]},
b_ec:{E:true,T:"bad",tit:"마음의 문이 닫혔어요",edlg:'"...그만해. 나 혼자 있고 싶어." (눈물이 났다)',msg:"위로하려 했지만 소이의 지금 이 순간 아픔을 충분히 받아주지 못했어요.\n\n온유함은 빨리 좋아지게 하려는 마음보다, 지금 이 순간의 아픔에 함께 있어주는 것이에요."},
main3:{stage:3,loc:"학교 복도 구석, 쉬는 시간",narr:"소이가 피식 웃었다. 울다가 웃는 얼굴이었다.",speaker:"소이",dlg:'"...나 진짜 창피해. 고백할 때 얼굴이 엄청 빨개졌거든."',ch:[{t:'"그랬겠다. 얼마나 떨렸겠어."',n:"main4"},{t:'"에이, 그게 더 귀여웠을 거야!"',n:"b3a"},{t:'"나도 그런 적 있는데 진짜 공감해. 내가 언제였냐면..."',n:"b3b"}]},
b3a:{stage:3,loc:"학교 복도 구석, 쉬는 시간",narr:"소이의 웃음이 사라졌다.",speaker:"소이",dlg:'"...귀여운 게 아니라 그냥 창피한 거라고."',ch:[{t:'"맞아, 창피한 거지. 그 마음 이해해."',n:"main4"},{t:'"아니야, 그런 거 예쁜 거야 진짜!"',n:"b_ed"}]},
b3b:{stage:3,loc:"학교 복도 구석, 쉬는 시간",narr:"소이가 어색하게 웃었다.",speaker:"소이",dlg:'"어... 그래?" (분위기가 달라진 것 같다)',ch:[{t:'"아 미안, 지금 내 얘기 할 게 아니었다. 많이 창피했지?"',n:"main4"},{t:'"어, 그래서 내가 어떻게 했냐면..." (계속 내 얘기를 한다)',n:"b_ed"}]},
b_ed:{E:true,T:"bad",tit:"마음의 문이 닫혔어요",edlg:'"...응. 뭐, 그렇구나." (표정이 닫혔다)',msg:"소이가 자기 이야기를 꺼내려 했는데 충분히 받아주지 못했어요.\n\n온유함은 웃음으로 덮거나 내 이야기로 전환하지 않고, 상대의 창피함과 함께 앉아있는 것이에요."},
main4:{stage:4,loc:"학교 복도 구석, 쉬는 시간",narr:"소이가 조용히 말했다.",speaker:"소이",dlg:'"...고마워. 옆에 있어줘서."',ch:[{t:'"나도 고마워. 나한테 이런 거 말해줘서."',n:"good_end"},{t:'"당연하지! 그래서 준혁이한테 앞으로 어떻게 할 거야?"',n:"b4a"}]},
b4a:{stage:4,loc:"학교 복도 구석, 쉬는 시간",narr:"소이가 조금 시무룩해졌다.",speaker:"소이",dlg:'"...아직 모르겠어. 지금 그 생각하기 싫어."',ch:[{t:'"그래, 나중에 생각해. 지금은 그냥 여기 있자."',n:"good_end"},{t:'"아니, 빨리 정리해야 서로 편하지. 어떻게 할지 생각해봐."',n:"b_ee"}]},
b_ee:{E:true,T:"bad",tit:"마음의 문이 닫혔어요",edlg:'"...됐어. 나 혼자 정리할게." (일어났다)',msg:"거의 다 왔는데 마지막에 빨리 정리하려 했어요. 소이는 아직 그 아픔 안에 있었는데요.\n\n온유함은 상대가 나올 준비가 될 때까지, 그 안에 같이 있어주는 것이에요."},
good_end:{E:true,T:"good",tit:"아픔 옆에 함께 앉아준 것",edlg:'"...있어줘서 진짜 다행이야."',msg:"준혁이가 마음을 바꾼 건 아니에요. 창피함이 사라진 것도 아니고요.\n\n그런데 소이는 혼자가 아니었어요. 그것만으로도 충분했어요.\n\n온유함은 아픔을 없애주는 게 아니라, 그 아픔 옆에 함께 앉아주는 것이에요."}};
const ST=5;let cur='start',ms=0;
function ch(){return'<div class="chars"><div class="ch me"><div class="ch-h"></div><div class="ch-b"></div><div class="ch-l">나</div></div><div class="ch soi"><div class="ch-h"></div><div class="ch-b"></div><div class="ch-l">소이</div></div></div>';}
function dots(s){var b=document.getElementById('sbar');if(!b)return;b.innerHTML='';for(var i=0;i<ST;i++){var d=document.createElement('div');d.className='dot'+(i<s?' done':i===s?' active':'');b.appendChild(d);}var l=document.createElement('span');l.className='slbl';l.textContent=(Math.min(s,ST-1)+1)+' / '+ST+'단계';b.appendChild(l);}
function render(){var node=N[cur];if(!node)return;var main=document.getElementById('main');if(node.E){var sb=document.getElementById('sbar');if(sb)sb.innerHTML='';var isG=node.T==='good';var msg=node.msg.split('\n\n').map(function(l){return'<p>'+l+'</p>';}).join('');var dc=node.edlg?'<div class="sc" style="margin-bottom:12px;"><div class="stop"><span class="ltag">학교 복도 구석, 쉬는 시간</span>'+ch()+'</div><div class="sbody"><div class="spk">소이</div><div class="dlg">'+node.edlg+'</div></div></div>':'';main.innerHTML=dc+'<div class="end-card"><div class="eico" style="background:'+(isG?'#F5EAF0':'#F0ECE4')+';"><svg width="24" height="24" viewBox="0 0 24 24" fill="none">'+(isG?'<path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26Z" fill="#A85872"/>':'<circle cx="12" cy="12" r="9" stroke="#B0A090" stroke-width="1.5"/><path d="M12 7v5.5M12 15.5v1" stroke="#B0A090" stroke-width="1.5" stroke-linecap="round"/>')+'</svg></div><div class="etit" style="color:'+(isG?'#8A4060':'#4A4038')+';">'+node.tit+'</div><div class="eline" style="background:'+(isG?'#A85872':'#C8BEB0')+'"></div><div class="emsg">'+msg+'</div><hr class="ediv"><div class="ehint">처음부터 다시 해볼까요?</div><button class="rbtn" onclick="restart()">다시 시작하기</button></div>';return;}var s=node.stage||0;if(s>ms)ms=s;dots(Math.min(ms,ST-1));var labs=['A','B','C'];main.innerHTML='<div class="sc"><div class="stop"><span class="ltag">'+node.loc+'</span>'+ch()+'</div><div class="sbody">'+(node.narr?'<div class="narr">'+node.narr+'</div>':'')+'<div class="spk">'+node.speaker+'</div><div class="dlg">'+node.dlg+'</div></div></div><div class="choices" id="cw"></div>';var cw=document.getElementById('cw');node.ch.forEach(function(c,i){var btn=document.createElement('button');btn.className='cbtn';btn.innerHTML='<span class="lbl">'+labs[i]+'</span>'+c.t;btn.onclick=(function(n){return function(){cur=n;render();};})(c.n);cw.appendChild(btn);});}
function restart(){cur='start';ms=0;document.getElementById('sbar').innerHTML='';document.getElementById('main').innerHTML='';render();}
render();
</script></body></html>
