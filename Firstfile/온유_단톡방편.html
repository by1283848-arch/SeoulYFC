<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>온유 — 단톡방편</title>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;background:#FAF8F3;color:#2C2A24;min-height:100vh;}#wrap{max-width:520px;margin:0 auto;padding:20px 16px 60px;}.hdr{text-align:center;padding:24px 0 20px;}.hdr-t{font-size:22px;font-weight:700;color:#4A3A7A;}.hdr-s{font-size:13px;color:#9A8060;margin-top:4px;}.hdr-l{width:32px;height:1px;background:#7060A0;margin:12px auto 0;}.sbar{display:flex;align-items:center;gap:8px;margin-bottom:20px;}.dot{width:10px;height:10px;border-radius:50%;background:#D9D3C8;}.dot.done{background:#B49A6A;}.dot.active{background:#7A6040;}.slbl{font-size:12px;color:#9A8060;margin-left:4px;}.sc{background:#fff;border-radius:16px;border:1px solid #EDE6D8;overflow:hidden;margin-bottom:12px;}.stop{height:90px;background:#EEE8F8;display:flex;align-items:center;justify-content:center;position:relative;}.ltag{position:absolute;top:8px;left:12px;font-size:11px;color:#9A8060;font-weight:500;}.chars{display:flex;gap:32px;align-items:flex-end;}.ch{display:flex;flex-direction:column;align-items:center;gap:3px;}.ch-h{width:30px;height:30px;border-radius:50%;}.ch-b{width:22px;height:32px;border-radius:11px 11px 4px 4px;}.ch-l{font-size:10px;color:#9A8060;font-weight:500;}.me .ch-h{background:#A8C4D8;}.me .ch-b{background:#6A9BBF;}.mina .ch-h{background:#9A8AC4;}.mina .ch-b{background:#7060A0;}.sbody{padding:16px 18px;}.narr{font-size:13px;color:#9A8060;font-style:italic;line-height:1.6;margin-bottom:10px;}.spk{font-size:12px;font-weight:600;color:#9A8060;margin-bottom:4px;}.dlg{font-size:16px;color:#2C2A24;line-height:1.75;}.choices{display:flex;flex-direction:column;gap:10px;}.cbtn{display:block;background:#fff;border:1px solid #D9D3C8;border-radius:12px;padding:14px 16px;text-decoration:none;font-size:15px;color:#2C2A24;line-height:1.55;cursor:pointer;width:100%;text-align:left;}.cbtn:active{background:#EEE8F8;}.lbl{font-size:12px;font-weight:600;color:#9A8060;margin-right:6px;}.end-card{background:#fff;border-radius:16px;border:1px solid #EDE6D8;padding:32px 24px;text-align:center;}.eico{width:52px;height:52px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;}.etit{font-size:20px;font-weight:700;margin-bottom:8px;}.eline{width:32px;height:1px;margin:0 auto 16px;}.emsg{font-size:15px;color:#6A6058;line-height:1.8;text-align:left;margin-bottom:24px;}.emsg p{margin-bottom:12px;}.ediv{border:none;border-top:1px solid #EDE6D8;margin:0 0 16px;}.ehint{font-size:12px;color:#9A8060;margin-bottom:10px;}.rbtn{background:transparent;border:1px solid #D9D3C8;border-radius:12px;padding:12px 24px;font-size:15px;cursor:pointer;color:#2C2A24;}.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#9A8060;text-decoration:none;margin-bottom:20px;}</style></head>
<body><div id="wrap"><a class="back-btn" href="../index.html"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="#9A8060" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>처음으로</a><div class="hdr"><div class="hdr-t">온유</div><div class="hdr-s">단톡방에서 따돌림당한 친구 민아</div><div class="hdr-l"></div></div><div class="sbar" id="sbar"></div><div id="main"></div></div>
<script>
const N={start:{stage:0,loc:"교실 구석, 점심 시간",narr:"점심시간인데 친한 친구 민아가 교실 구석에 혼자 핸드폰을 보고 있다. 가까이 가자 화면을 뒤집었다.",speaker:"민아",dlg:'"...어, 왔어."',ch:[{t:'"밥 먹으러 가자." (핸드폰은 못 본 척한다)',n:"b0a"},{t:'"야, 표정이 왜 그래. 무슨 일 있어?"',n:"main1"},{t:'"단톡방에서 무슨 일 있어?" (직접 물어본다)',n:"b0b"}]},
b0a:{stage:0,loc:"교실 구석, 점심 시간",narr:"밥을 먹는 내내 민아가 말이 없었다.",speaker:"민아",dlg:'"...응." (밥만 먹었다)',ch:[{t:'"야, 오늘 왜 이래. 무슨 일 있어?"',n:"main1"},{t:'(밥을 다 먹었다) "다 먹었다, 가자." (그냥 넘어간다)',n:"b_ea"}]},
b0b:{stage:0,loc:"교실 구석, 점심 시간",narr:"민아가 잠깐 굳었다.",speaker:"민아",dlg:'"...별거 아니야." (시선을 피했다)',ch:[{t:'"그래, 별거 아니어도 돼. 근데 표정이 좀 그렇더라."',n:"main1"},{t:'"아니잖아, 봤거든. 말해봐."',n:"b_ea"}]},
b_ea:{E:true,T:"bad",tit:"마음의 문이 닫혔어요",edlg:'"...아니야, 진짜 괜찮아." (웃는 척 했다)',msg:"민아는 그날 아무한테도 털어놓지 못했어요. 말하지 않아도 알아주기를 바랐는데.\n\n온유함은 상대가 준비될 때까지 기다리되, 신호를 놓치지 않는 것이에요."},
main1:{stage:1,loc:"교실 구석, 점심 시간",narr:"민아가 잠깐 머뭇거렸다.",speaker:"민아",dlg:'"있잖아... 우리 반 단톡방 있잖아. 거기서 애들이 나 빼고 주말에 놀러 갔더라고."',ch:[{t:'"...그랬구나. 그게 얼마나 상처받았겠어."',n:"main2"},{t:'"진짜? 걔네가 이상한 거야. 왜 너를 빼고 가."',n:"b1a"},{t:'"어? 다 같이 안 갈 수도 있지 않아?"',n:"b1b"}]},
b1a:{stage:1,loc:"교실 구석, 점심 시간",narr:"민아가 잠깐 멈췄다.",speaker:"민아",dlg:'"...근데 나도 내가 뭔가 잘못한 건지 모르겠어서."',ch:[{t:'"그렇구나. 그게 더 무섭겠다, 이유를 모르는 게."',n:"main2"},{t:'"아니야, 걔네가 이상한 거야. 너는 잘못한 거 없어."',n:"b_eb"}]},
b1b:{stage:1,loc:"교실 구석, 점심 시간",narr:"민아의 표정이 굳었다.",speaker:"민아",dlg:'"...그게 맞는 말이긴 한데, 그래도 속상하잖아."',ch:[{t:'"맞아. 맞는 상황이어도 속상한 건 속상한 거지. 미안."',n:"main2"},{t:'"뭐, 별로 안 친한 애들이면 어쩔 수 없는 거 아니야?"',n:"b_eb"}]},
b_eb:{E:true,T:"bad",tit:"마음의 문이 닫혔어요",edlg:'"...그래, 뭐. 됐어." (더 이상 말하지 않았다)',msg:"민아의 아픔을 너무 빨리 판단하거나 넘겨버렸어요.\n\n온유함은 상대의 아픔이 논리적으로 맞는지와 상관없이, 그 아픔 자체를 먼저 인정해주는 것이에요."},
main2:{stage:2,loc:"교실 구석, 점심 시간",narr:"민아가 작게 한숨을 쉬었다.",speaker:"민아",dlg:'"나도 내가 뭔가 잘못한 건지 모르겠어. 최근에 좀 바빠서 대화를 잘 못 했나."',ch:[{t:'"스스로 그렇게 생각하는 게 더 힘들겠다."',n:"main3"},{t:'"그러면 네가 먼저 연락해봐. 오해일 수도 있으니까."',n:"b2a"},{t:'"야, 그게 네 잘못이야? 바빴던 거잖아."',n:"b2b"}]},
b2a:{stage:2,loc:"교실 구석, 점심 시간",narr:"민아가 고개를 저었다.",speaker:"민아",dlg:'"...그게 무서워서 못 하겠어."',ch:[{t:'"무섭지. 연락했다가 반응이 차가우면 더 확인이 되잖아."',n:"main3"},{t:'"그래도 해봐야지. 안 하면 계속 이 상태잖아."',n:"b_ec"}]},
b2b:{stage:2,loc:"교실 구석, 점심 시간",narr:"민아가 고개를 저었다.",speaker:"민아",dlg:'"...그래도 내 탓인 것 같아."',ch:[{t:'"네가 그렇게 느끼는구나. 그 마음도 힘들겠다."',n:"main3"},{t:'"아니야, 걔네가 이해심이 없는 거야."',n:"b_ec"}]},
b_ec:{E:true,T:"bad",tit:"마음의 문이 닫혔어요",edlg:'"...그래, 뭐. 내가 알아서 할게." (더 이상 마음을 열지 않았다)',msg:"민아가 충분히 마음을 풀기 전에 해결책이나 판단이 먼저 왔어요.\n\n온유함은 상대가 스스로 답을 찾을 수 있도록, 그 전에 충분히 들어주는 것이에요."},
main3:{stage:3,loc:"교실 구석, 점심 시간",narr:"민아가 눈을 깜빡이며 말했다.",speaker:"민아",dlg:'"...걔네한테 직접 물어봐야 하나? 왜 나 빼고 갔냐고."',ch:[{t:'"물어보고 싶으면 할 수 있어. 근데 지금 당장 해야 하는 건 아니야."',n:"main4"},{t:'"당연하지! 직접 물어봐야 해결이 되지."',n:"b3a"},{t:'"아니, 그건 오히려 어색해질 수 있어. 그냥 두는 게 나아."',n:"b3b"}]},
b3a:{stage:3,loc:"교실 구석, 점심 시간",narr:"민아가 움츠러들었다.",speaker:"민아",dlg:'"...근데 겁나."',ch:[{t:'"겁나는 거 당연해. 네 페이스대로 해."',n:"main4"},{t:'"겁내지 마. 어차피 해결해야 할 거잖아."',n:"b_ed"}]},
b3b:{stage:3,loc:"교실 구석, 점심 시간",narr:"민아가 고개를 저었다.",speaker:"민아",dlg:'"...근데 모른 척하기도 힘들어."',ch:[{t:'"그렇지. 어느 쪽도 쉽지 않지. 지금 당장 결정 안 해도 돼."',n:"main4"},{t:'"그러면 일단 다른 그룹이랑 더 친해져봐. 그 애들이 전부가 아니잖아."',n:"b_ed"}]},
b_ed:{E:true,T:"bad",tit:"마음의 문이 닫혔어요",edlg:'"...그래. 알겠어." (표정이 닫혔다)',msg:"민아에게 필요한 건 정답이 아니었어요. 어느 쪽을 선택하든 힘들다는 것 자체를 인정해주는 말이었어요.\n\n온유함은 해결책보다 '그럴 만하다'는 말을 먼저 건네는 것이에요."},
main4:{stage:4,loc:"교실 구석, 점심 시간",narr:"민아가 조금 표정이 풀렸다.",speaker:"민아",dlg:'"...나한테 이런 거 말하기 부끄러웠어. 나 좀 찌질한 것 같아서."',ch:[{t:'"찌질한 게 아니야. 이런 거 말할 수 있는 게 더 용기 있는 거야."',n:"good_end"},{t:'"찌질하긴, 당연한 거지!"',n:"b4a"},{t:'"어, 좀 그렇긴 한데 뭐, 괜찮아ㅋㅋ"',n:"b4b"}]},
b4a:{stage:4,loc:"교실 구석, 점심 시간",narr:"민아가 고개를 저었다.",speaker:"민아",dlg:'"...아니야, 진짜 찌질한 것 같아."',ch:[{t:'"그 마음 이해해. 근데 나한테 말해줘서 고마워."',n:"good_end"},{t:'"아니야 진짜! 이런 게 어떻게 찌질해."',n:"b_ee"}]},
b4b:{stage:4,loc:"교실 구석, 점심 시간",narr:"민아가 더 움츠러들었다.",speaker:"민아",dlg:'"...그치? 좀 찌질하지?"',ch:[{t:'"아, 그 말 잘못했다. 찌질하지 않아. 말해줘서 고마워."',n:"good_end"},{t:'"ㅋㅋ 아니 근데 뭐, 다 그런 거지."',n:"b_ee"}]},
b_ee:{E:true,T:"bad",tit:"마음의 문이 닫혔어요",edlg:'"...그래. 뭐, 맞는 말이긴 해." (억지로 웃으며 더 이상 말하지 않았다)',msg:"민아가 용기 내서 솔직하게 말했는데, 그 용기를 충분히 받아주지 못했어요.\n\n온유함은 상대가 스스로를 낮출 때 함께 낮아지거나 가볍게 넘기지 않는 것이에요."},
good_end:{E:true,T:"good",tit:"혼자가 아니라는 것",edlg:'"...말하길 잘했다. 고마워."',msg:"단톡방 상황이 해결된 건 아니에요. 애들 마음이 어떤지도 아직 몰라요.\n\n그런데 민아는 혼자가 아니라는 걸 알았어요. 그것만으로 충분히 달라졌어요.\n\n온유함은 문제를 해결해 주는 게 아니라, 그 안에서 혼자가 아니게 해주는 것이에요."}};
const ST=5;let cur='start',ms=0;
function ch(){return'<div class="chars"><div class="ch me"><div class="ch-h"></div><div class="ch-b"></div><div class="ch-l">나</div></div><div class="ch mina"><div class="ch-h"></div><div class="ch-b"></div><div class="ch-l">민아</div></div></div>';}
function dots(s){var b=document.getElementById('sbar');if(!b)return;b.innerHTML='';for(var i=0;i<ST;i++){var d=document.createElement('div');d.className='dot'+(i<s?' done':i===s?' active':'');b.appendChild(d);}var l=document.createElement('span');l.className='slbl';l.textContent=(Math.min(s,ST-1)+1)+' / '+ST+'단계';b.appendChild(l);}
function render(){var node=N[cur];if(!node)return;var main=document.getElementById('main');if(node.E){var sb=document.getElementById('sbar');if(sb)sb.innerHTML='';var isG=node.T==='good';var msg=node.msg.split('\n\n').map(function(l){return'<p>'+l+'</p>';}).join('');var dc=node.edlg?'<div class="sc" style="margin-bottom:12px;"><div class="stop"><span class="ltag">교실 구석, 점심 시간</span>'+ch()+'</div><div class="sbody"><div class="spk">민아</div><div class="dlg">'+node.edlg+'</div></div></div>':'';main.innerHTML=dc+'<div class="end-card"><div class="eico" style="background:'+(isG?'#EEE8F8':'#F0ECE4')+';"><svg width="24" height="24" viewBox="0 0 24 24" fill="none">'+(isG?'<path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26Z" fill="#7060A0"/>':'<circle cx="12" cy="12" r="9" stroke="#B0A090" stroke-width="1.5"/><path d="M12 7v5.5M12 15.5v1" stroke="#B0A090" stroke-width="1.5" stroke-linecap="round"/>')+'</svg></div><div class="etit" style="color:'+(isG?'#4A3A7A':'#4A4038')+';">'+node.tit+'</div><div class="eline" style="background:'+(isG?'#7060A0':'#C8BEB0')+'"></div><div class="emsg">'+msg+'</div><hr class="ediv"><div class="ehint">처음부터 다시 해볼까요?</div><button class="rbtn" onclick="restart()">다시 시작하기</button></div>';return;}var s=node.stage||0;if(s>ms)ms=s;dots(Math.min(ms,ST-1));var labs=['A','B','C'];main.innerHTML='<div class="sc"><div class="stop"><span class="ltag">'+node.loc+'</span>'+ch()+'</div><div class="sbody">'+(node.narr?'<div class="narr">'+node.narr+'</div>':'')+'<div class="spk">'+node.speaker+'</div><div class="dlg">'+node.dlg+'</div></div></div><div class="choices" id="cw"></div>';var cw=document.getElementById('cw');node.ch.forEach(function(c,i){var btn=document.createElement('button');btn.className='cbtn';btn.innerHTML='<span class="lbl">'+labs[i]+'</span>'+c.t;btn.onclick=(function(n){return function(){cur=n;render();};})(c.n);cw.appendChild(btn);});}
function restart(){cur='start';ms=0;document.getElementById('sbar').innerHTML='';document.getElementById('main').innerHTML='';render();}
render();
</script></body></html>
