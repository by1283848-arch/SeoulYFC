<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #FAF8F3;
      color: #2C2A24;
      min-height: 100vh;
    }
    #gw { max-width: 520px; margin: 0 auto; padding: 20px 16px 60px; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #9A8060;
      text-decoration: none;
      margin-bottom: 20px;
    }

    .hdr { text-align: center; padding: 24px 0 20px; }
    .hdr-t { font-size: 22px; font-weight: 700; color: #3A7A5A; }
    .hdr-s { font-size: 13px; color: #9A8060; margin-top: 4px; }
    .hdr-l { width: 32px; height: 1px; background: #5A9E80; margin: 12px auto 0; }

    .sbar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #D9D3C8; transition: background .3s; }
    .dot.done { background: #B49A6A; }
    .dot.active { background: #7A6040; }
    .slbl { font-size: 12px; color: #9A8060; margin-left: 4px; }

    .sc { background: #fff; border-radius: 16px; border: 1px solid #EDE6D8; overflow: hidden; margin-bottom: 12px; }
    .stop { height: 90px; background: #EEF3F0; display: flex; align-items: center; justify-content: center; position: relative; }
    .ltag { position: absolute; top: 8px; left: 12px; font-size: 11px; color: #9A8060; font-weight: 500; }
    .chars { display: flex; gap: 36px; align-items: flex-end; }
    .ch { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .ch-h { width: 28px; height: 28px; border-radius: 50%; }
    .ch-b { width: 20px; height: 30px; border-radius: 10px 10px 4px 4px; }
    .ch-l { font-size: 10px; color: #9A8060; font-weight: 500; }
    .me .ch-h { background: #A8C4D8; }
    .me .ch-b { background: #6A9BBF; }
    .jihun .ch-h { background: #8FC4A8; }
    .jihun .ch-b { background: #5A9E80; }

    .sbody { padding: 16px 18px; }
    .narr { font-size: 13px; color: #9A8060; font-style: italic; line-height: 1.6; margin-bottom: 10px; }
    .spk { font-size: 12px; font-weight: 600; color: #9A8060; margin-bottom: 4px; }
    .dlg { font-size: 16px; color: #2C2A24; line-height: 1.75; }

    .choices { display: flex; flex-direction: column; gap: 10px; }
    .cbtn {
      background: #fff;
      border: 1px solid #D9D3C8;
      border-radius: 12px;
      padding: 14px 16px;
      text-align: left;
      cursor: pointer;
      font-size: 15px;
      color: #2C2A24;
      line-height: 1.55;
      width: 100%;
      -webkit-appearance: none;
    }
    .cbtn:active { background: #EEF3F0; }
    .lbl { font-size: 12px; font-weight: 600; color: #9A8060; margin-right: 6px; }

    .ewrap { background: #fff; border-radius: 16px; border: 1px solid #EDE6D8; padding: 32px 24px; text-align: center; }
    .eico { width: 52px; height: 52px; border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; }
    .etit { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .esub { font-size: 15px; color: #6A6058; line-height: 1.8; text-align: left; margin-bottom: 24px; }
    .esub p { margin-bottom: 12px; }
    .ediv { border: none; border-top: 1px solid #EDE6D8; margin: 0 0 16px; }
    .ehint { font-size: 12px; color: #9A8060; margin-bottom: 10px; }
    .rbtn { background: transparent; border: 1px solid #D9D3C8; border-radius: 12px; padding: 12px 24px; font-size: 15px; cursor: pointer; color: #2C2A24; }
  </style>
</head>

const STAGES = 5;
let cur = 'start', maxStage = 0;

function charHTML() {
  return `<div class="chars">
    <div class="ch me"><div class="ch-h"></div><div class="ch-b"></div><div class="ch-l">나</div></div>
    <div class="ch jihun"><div class="ch-h"></div><div class="ch-b"></div><div class="ch-l">지훈</div></div>
  </div>`;
}

function dots(s) {
  const bar = document.getElementById('sbar');
  if (!bar) return;
  bar.innerHTML = '';
  for (let i = 0; i < STAGES; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < s ? ' done' : i === s ? ' active' : '');
    bar.appendChild(d);
  }
  const l = document.createElement('span');
  l.className = 'slbl';
  l.textContent = (Math.min(s, STAGES-1) + 1) + ' / ' + STAGES + '단계';
  bar.appendChild(l);
}

function render() {
  const node = N[cur];
  if (!node) return;
  const main = document.getElementById('main');
  if (node.isEnd) {
    document.getElementById('sbar').innerHTML = '';
    renderEnd(node, main);
    return;
  }
  const s = node.stage || 0;
  if (s > maxStage) maxStage = s;
  dots(Math.min(maxStage, STAGES-1));
  const labels = ['A','B','C'];
  main.innerHTML = `
    <div class="sc">
      <div class="stop"><span class="ltag">${node.loc}</span>${charHTML()}</div>
      <div class="sbody">
        ${node.narr ? `<div class="narr">${node.narr}</div>` : ''}
        <div class="spk">${node.speaker}</div>
        <div class="dlg">${node.dlg}</div>
      </div>
    </div>
    <div class="choices" id="cw"></div>
  `;
  const cw = document.getElementById('cw');
  node.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'cbtn';
    btn.innerHTML = `<span class="lbl">${labels[i]}</span>${c.text}`;
    btn.onclick = () => { cur = c.next; render(); };
    cw.appendChild(btn);
  });
}

function renderEnd(node, main) {
  const isGood = node.endType === 'good';
  const msgLines = node.endMsg.split('\n\n').map(l => `<p>${l}</p>`).join('');
  const dlgCard = node.endDlg ? `
    <div class="sc" style="margin-bottom:12px;">
      <div class="stop"><span class="ltag">집, 지훈이 방</span>${charHTML()}</div>
      <div class="sbody"><div class="spk">지훈</div><div class="dlg">${node.endDlg}</div></div>
    </div>` : '';
  main.innerHTML = dlgCard + `
    <div class="ewrap">
      <div class="eico" style="background:${isGood ? '#EEF7F2' : '#F0ECE4'};">
        ${isGood
          ? `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26Z" fill="#5A9E80"/></svg>`
          : `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#B0A090" stroke-width="1.5"/><path d="M12 7v5.5M12 15.5v1" stroke="#B0A090" stroke-width="1.5" stroke-linecap="round"/></svg>`
        }
      </div>
      <div class="etit" style="color:${isGood ? '#3A7A5A' : '#4A4038'};">${node.endTitle}</div>
      <div style="width:32px;height:1px;background:${isGood ? '#5A9E80' : '#C8BEB0'};margin:10px auto 16px;"></div>
      <div class="esub">${msgLines}</div>
      <hr class="ediv">
      <div class="ehint">처음부터 다시 해볼까요?</div>
      <button class="rbtn" onclick="restart()">다시 시작하기</button>
    </div>
  `;
}

function restart() {
  cur = 'start'; maxStage = 0;
  document.getElementById('sbar').innerHTML = '';
  document.getElementById('main').innerHTML = '';
  render();
}

render();
</script>
</body>
</html>
